name: Keep Backend Warm

on:
  schedule:
    # Run every 10 minutes to keep the Render container active
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          # Replace the URL below with your actual deployed Render URL if it differs
          curl -I -s -o /dev/null -w "Response Code: %{http_code}\n" https://ai-hiring-backend.onrender.com/ping
