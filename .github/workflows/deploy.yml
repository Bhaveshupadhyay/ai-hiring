name: Deploy to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Render Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Call Render Deploy Webhook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "Error: RENDER_DEPLOY_HOOK_URL secret is not configured in GitHub Secrets."
            exit 1
          fi
          echo "Triggering Render deployment..."
          curl -s -f "$RENDER_DEPLOY_HOOK"
          echo "Deploy trigger sent successfully!"